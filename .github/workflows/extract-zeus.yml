name: Extract ZEUS Kernel

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Project folder and extract ZIP
        run: |
          mkdir -p Project
          unzip -o ZEUS_KERNEL.zip -d Project

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Project
          git commit -m "Extract ZEUS_KERNEL.zip into Project folder" || echo "No changes to commit"
          git push
